<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendham Golf - Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        .full-screen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('Approach_01_After.jpg'); 
            background-size: cover;
            background-position: center;
        }

        .full-screen-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            color: #333;
        }

        .content-box h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #27ae60;
            display: inline-block;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button.action-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        button.action-btn:hover {
            background-color: #219150;
        }

        .error-msg {
            color: #c0392b;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="full-screen-bg">
        <div class="content-box">
            <div style="margin-bottom: 20px;">
                <h1>Mendham Golf & Tennis</h1>
                <p style="color: #666; margin-top: 10px;">Hole 10 Improvement Plan</p>
            </div>
            
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter Password">
                <p class="error-msg" id="errorMsg">Incorrect password. Please try again.</p>
            </div>
            <button class="action-btn" onclick="checkLogin()">Login</button>
        </div>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMsg');
            const container = document.querySelector('.content-box');

            if (pass === "password") {
                // Fade out effect
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease';
                
                setTimeout(() => {
                    // Redirect to the Intro page
                    window.location.href = 'intro.html';
                }, 500);
            } else {
                error.style.display = 'block';
                // Shake animation
                container.style.transform = 'translateX(10px)';
                container.style.transition = 'transform 0.1s';
                setTimeout(() => container.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => container.style.transform = 'translateX(0)', 200);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkLogin();
        });
    </script>
</body>
</html>
